<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>YouTube ভিডিও প্লেয়ার (নিরাপদ এম্বেড)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Noto Sans Bengali', Roboto, system-ui, sans-serif;
      padding: 20px;
      margin: 0;
    }

    .card {
      background: rgba(22, 28, 46, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 1000px;
      transition: all 0.2s ease;
      border: 1px solid rgba(90, 140, 255, 0.2);
    }

    h1 {
      color: #eef4ff;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 span {
      background: #ff0033;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 40px;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(255, 0, 51, 0.3);
    }

    .sub {
      color: #a8b7dd;
      margin-bottom: 24px;
      font-size: 1rem;
      border-left: 4px solid #3b82f6;
      padding-left: 16px;
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .input-wrapper {
      flex: 1 1 300px;
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b85b0;
      font-style: normal;
      font-weight: 500;
    }

    #videoUrl {
      width: 100%;
      padding: 16px 20px 16px 52px;
      font-size: 1rem;
      background: #0f1422;
      border: 1.5px solid #2e3a5c;
      border-radius: 60px;
      color: #e3ecff;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    #videoUrl:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
      background: #151e32;
    }

    #videoUrl::placeholder {
      color: #5f739c;
      font-size: 0.95rem;
    }

    .load-btn {
      background: #2563eb;
      border: none;
      padding: 0 32px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.15s;
      letter-spacing: 0.3px;
      min-width: 140px;
    }

    .load-btn:hover {
      background: #3b82f6;
      transform: scale(1.02);
      box-shadow: 0 10px 22px #1e3a8a80;
    }

    .load-btn:active {
      background: #1d4ed8;
      transform: scale(0.98);
    }

    .player-container {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 35px -5px #00000080, inset 0 0 0 1px #2e3f66;
      background: #000;
      aspect-ratio: 16 / 9;
      margin-top: 8px;
    }

    /* গুরুত্বপূর্ণ: iframe-কে স্যান্ডবক্স করা হয়েছে — YouTube খুলবে না */
    .secure-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* নোটিশ বার */
    .security-note {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      background: #1a2440;
      padding: 12px 18px;
      border-radius: 48px;
      color: #b7ceff;
      font-size: 0.9rem;
      border: 1px solid #31486c;
    }

    .badge {
      background: #10b981;
      color: #000;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .error-msg {
      color: #f87171;
      margin-top: 10px;
      padding-left: 8px;
      font-weight: 500;
      min-height: 24px;
    }

    .footer-note {
      text-align: right;
      color: #4f6290;
      margin-top: 12px;
      font-size: 0.85rem;
    }

    /* লোডিং ইন্ডিকেটর */
    .loading-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #a0b5e0;
      background: #0a0f1c;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>
    📺 ইউটিউব ভিডিও দেখুন
    <span>স্যান্ডবক্সড</span>
  </h1>
  <div class="sub">যেকোনো ভিডিও লিংক দিন — YouTube খুলবে না, সম্পূর্ণ নিরাপদ</div>

  <div class="input-group">
    <div class="input-wrapper">
      <i>🔗</i>
      <input type="text" id="videoUrl" placeholder="যেমন: https://youtu.be/... অথবা https://www.youtube.com/watch?v=..." value="">
    </div>
    <button class="load-btn" id="loadBtn">▶ লোড করুন</button>
  </div>

  <!-- ভিডিও প্লেয়ার কন্টেইনার -->
  <div class="player-container" id="playerContainer">
    <div id="playerPlaceholder" class="loading-placeholder">
      <span style="opacity:0.8;">👆 উপরে লিংক দিয়ে ভিডিও লোড করুন</span>
    </div>
    <!-- আইফ্রেম ডায়নামিকভাবে বসবে -->
  </div>

  <div id="errorMessage" class="error-msg"></div>

  <div class="security-note">
    <span class="badge">🔒 নিরাপদ মোড</span>
    <span>ক্লিক করলেও YouTube-এর মূল পেজ খুলবে না • স্যান্ডবক্স সুরক্ষিত</span>
  </div>
  <div class="footer-note">
    ⚡ sandbox + modestbranding • শুধু ভিডিও দেখুন
  </div>
</div>

<script>
  (function() {
    "use strict";

    const DOM = {
      input: document.getElementById('videoUrl'),
      loadBtn: document.getElementById('loadBtn'),
      playerContainer: document.getElementById('playerContainer'),
      errorMsg: document.getElementById('errorMessage'),
      placeholder: document.getElementById('playerPlaceholder')
    };

    // বর্তমান আইফ্রেম রেফারেন্স (থাকলে)
    let currentIframe = null;

    // ---------- ইউটিউব ভিডিও আইডি বের করার ফাংশন ----------
    function extractYouTubeID(url) {
      if (!url || typeof url !== 'string') return null;
      url = url.trim();
      
      // বিভিন্ন ফরম্যাট সাপোর্ট
      const patterns = [
        /(?:youtube\.com\/watch\?v=)([^&#?/\s]+)/i,               // standard watch
        /(?:youtu\.be\/)([^?/\s&#]+)/i,                           // youtu.be
        /(?:youtube\.com\/embed\/)([^/?\s]+)/i,                    // embed link
        /(?:youtube\.com\/v\/)([^/?\s]+)/i,                        // old /v/
        /(?:youtube\.com\/shorts\/)([^/?\s]+)/i,                   // shorts
        /(?:m\.youtube\.com\/watch\?v=)([^&#?/\s]+)/i              // mobile
      ];

      for (let regex of patterns) {
        const match = url.match(regex);
        if (match && match[1] && match[1].length >= 11) {
          // সাধারণত ইউটিউব আইডি ১১ অক্ষরের, কিন্তু কিছুক্ষেত্রে ভিন্ন হতে পারে, আমরা শুধু ভ্যালিডেট করি
          return match[1];
        }
      }
      
      // সরাসরি আইডি দেওয়া থাকলে (১১ অক্ষর, নির্দিষ্ট ক্যারেক্টার)
      const directIdMatch = url.match(/^[a-zA-Z0-9_-]{11}$/);
      if (directIdMatch) return url;
      
      return null;
    }

    // ---------- ত্রুটি দেখানোর ফাংশন ----------
    function showError(message) {
      DOM.errorMsg.textContent = message || '';
    }

    // ---------- প্লেসহোল্ডার রিসেট (লোডিং বা খালি অবস্থা) ----------
    function setPlaceholderMessage(text, isError = false) {
      if (DOM.placeholder) {
        DOM.placeholder.style.display = 'flex';
        DOM.placeholder.innerHTML = `<span style="opacity:0.9; ${isError ? 'color:#fca5a5;' : ''}">${text}</span>`;
      }
    }

    function hidePlaceholder() {
      if (DOM.placeholder) {
        DOM.placeholder.style.display = 'none';
      }
    }

    // ---------- বিদ্যমান আইফ্রেম সরানো ----------
    function removeExistingIframe() {
      if (currentIframe) {
        currentIframe.remove();
        currentIframe = null;
      }
      // আবার প্লেসহোল্ডার দেখাও যদি কিছু না থাকে
      if (DOM.placeholder) {
        DOM.placeholder.style.display = 'flex';
        DOM.placeholder.innerHTML = `<span style="opacity:0.8;">🎬 ভিডিও লোড করার জন্য প্রস্তুত</span>`;
      }
    }

    // ---------- নিরাপদ আইফ্রেম তৈরি ----------
    function createSecureIframe(videoId) {
      // YouTube embed URL প্যারামিটারগুলো এমনভাবে সেট করা হয়েছে যেন ব্র্যান্ডিং কম দেখায় ও নেভিগেশন আটকানো যায়
      // modestbranding=1 (YouTube লোগো ছোট করে, কিন্তু পুরোপুরি সরায় না)
      // rel=0 (সম্পর্কিত ভিডিও একই চ্যানেলের দেখাবে, বাইরের নয়)
      // showinfo=0 (টাইটেল বার সরায় - কিছু ব্রাউজারে কাজ নাও করতে পারে)
      // iv_load_policy=3 (অ্যানোটেশন বন্ধ)
      // controls=1 (কন্ট্রোলার দেখাবে)
      // fs=1 (ফুলস্ক্রিন অনুমতি)
      // autoplay=0 (অটোপ্লে নয়)
      const embedUrl = `https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&controls=1&fs=1&hl=bn`;
      
      const iframe = document.createElement('iframe');
      iframe.className = 'secure-iframe';
      iframe.src = embedUrl;
      iframe.title = 'YouTube video player (secure)';
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
      iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
      
      // ⭐ গুরুত্বপূর্ণ: স্যান্ডবক্স অ্যাট্রিবিউট যা YouTube-কে মূল পেজ নেভিগেট বা পপআপ খুলতে বাধা দেয়।
      // allow-scripts, allow-same-origin, allow-presentation যুক্ত করেছি যেন ভিডিও প্লে হয়
      // কিন্তু allow-top-navigation, allow-popups, allow-forms দেওয়া হয়নি => YouTube খুলবে না।
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation');
      
      // allowfullscreen যুক্ত করি (ফুলস্ক্রিন কাজ করবে)
      iframe.setAttribute('allowfullscreen', '');
      
      return iframe;
    }

    // ---------- ভিডিও লোড করার প্রধান ফাংশন ----------
    function loadVideo() {
      const rawUrl = DOM.input.value.trim();
      showError(''); // আগের এরর মুছুন
      
      if (!rawUrl) {
        showError('⚠️ অনুগ্রহ করে একটি YouTube লিংক দিন');
        return;
      }

      const videoId = extractYouTubeID(rawUrl);
      if (!videoId) {
        showError('❌ সঠিক YouTube ভিডিও আইডি পাওয়া যায়নি। লিংকটি চেক করুন।');
        setPlaceholderMessage('❌ ভুল লিংক', true);
        return;
      }

      // প্লেসহোল্ডারে লোডিং দেখান
      setPlaceholderMessage('⏳ ভিডিও লোড হচ্ছে...');

      // পুরনো আইফ্রেম সরান
      removeExistingIframe();

      try {
        // নতুন নিরাপদ আইফ্রেম তৈরি
        const iframe = createSecureIframe(videoId);
        
        // প্লেসহোল্ডার লুকান এবং কন্টেইনারে আইফ্রেম যোগ করুন
        hidePlaceholder();
        DOM.playerContainer.appendChild(iframe);
        currentIframe = iframe;
        
        // কোনো ত্রুটি মেসেজ না থাকলে ক্লিয়ার
        showError('');
        
        // ঐচ্ছিক: ইনপুট ফিল্ডে একটি সাফ ইঙ্গিত
        DOM.input.style.borderColor = '#3b82f6';
        setTimeout(() => DOM.input.style.borderColor = '', 1000);
        
      } catch (e) {
        console.warn(e);
        showError('⚠️ ভিডিও লোড করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।');
        setPlaceholderMessage('🔄 পুনরায় চেষ্টা করুন', true);
      }
    }

    // ---------- ইভেন্ট লিসেনার ----------
    DOM.loadBtn.addEventListener('click', loadVideo);

    // এন্টার কী প্রেসেও লোড হবে
    DOM.input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        loadVideo();
      }
    });

    // অতিরিক্ত: যদি ইউজার সরাসরি কোন লিংক পেস্ট করে এবং আমরা প্রি-ফিল করি (ইচ্ছা করলে)
    // উদাহরণ হিসেবে ক্লিপবোর্ড থেকে পড়ার দরকার নেই, ম্যানুয়ালি ইনপুটেই হবে।

    // পেজ লোডে ডিফল্ট প্লেসহোল্ডার দেখানো
    // আমরা চাইলে একটি ডেমো ভিডিও দেখাতে পারি, কিন্তু ইউজার চাহিদামতো: শুধু লিংক দিলে কাজ করবে।
    // তবে ইউজার এক্সপেরিয়েন্সের জন্য একটি উদাহরণ দেওয়া যেতে পারে? না, চাইলেই দিবেন।
    // নিচে: যদি ইউজার চান তবে তারা টেস্ট করতে পারেন।

    // ঐচ্ছিক: একটি উদাহরণ সাজেশন (কিন্তু অটো লোড করব না)
    // আমরা placeholder এ টেক্সট রেখেছি।

    // ইউটিউব স্যান্ডবক্সের কার্যকারিতা যাচাই:
    // sandbox allow-scripts allow-same-origin allow-presentation => কোনো টপ-লেভেল নেভিগেশন হবে না।
    // ইউটিউবের লোগোতে ক্লিক করলে কিছুই হবে না বা iframe এর ভেতরেই নেভিগেট হওয়ার চেষ্টা ব্লক হবে।

    // কিছু ব্রাউজারে "watch on youtube" বাটন থাকতে পারে, সেটাও কাজ করবে না কারণ allow-top-navigation নেই।
    // এটি সম্পূর্ণরূপে ইউজারের চাওয়া "কোনো উপায়ে যেন YouTube open না হয়" শর্ত পূরণ করে।

    // তবে মনে রাখবেন: ডান ক্লিক করে "Open in new tab" ব্রাউজারের নিজস্ব ফিচার, সেটা ব্লক করা সম্ভব নয়।
    // কিন্তু পেজ থেকেই কোনো রিডাইরেক্ট বা পপআপ হবে না।

    // ব্যবহারকারীকে জানানোর জন্য আমরা security-note দিয়েছি।
    
    // (ঐচ্ছিক) ক্লিয়ার বাটন দরকার নেই, তবে ইচ্ছা করলে পরে যুক্ত করতে পারেন।
    
    // ফাংশন এক্সপোজ (ডিবাগের জন্য না)
    console.log('✅ সুরক্ষিত ইউটিউব এম্বেডার প্রস্তুত — YouTube খুলবে না।');
  })();
</script>
</body>
</html>
